name: Release Validation

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

concurrency:
  group: release-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-release-config:
    name: Validate Release Config
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Validate release metadata
        shell: pwsh
        run: ./Scripts/release-all.ps1 -ValidateConfigOnly

  prepare-publish-matrix:
    name: Prepare Publish Matrix
    needs: validate-release-config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Select publish smoke matrix
        id: set-matrix
        shell: pwsh
        run: |
          # PRs keep a representative smoke matrix to control latency while still
          # covering all three OS families. Full RID coverage remains on master pushes
          # and manual runs, where release confidence matters more than turnaround time.
          if ('${{ github.event_name }}' -eq 'pull_request') {
            $matrix = @{
              include = @(
                @{ runner = 'windows-latest'; rid = 'win-x64' },
                @{ runner = 'ubuntu-latest'; rid = 'linux-x64' },
                @{ runner = 'macos-latest'; rid = 'osx-arm64' }
              )
            }
          }
          else {
            $matrix = @{
              include = @(
                @{ runner = 'windows-latest'; rid = 'win-x64' },
                @{ runner = 'windows-latest'; rid = 'win-arm64' },
                @{ runner = 'ubuntu-latest'; rid = 'linux-x64' },
                @{ runner = 'ubuntu-latest'; rid = 'linux-arm64' },
                @{ runner = 'macos-latest'; rid = 'osx-x64' },
                @{ runner = 'macos-latest'; rid = 'osx-arm64' }
              )
            }
          }

          "matrix=$($matrix | ConvertTo-Json -Compress -Depth 4)" >> $env:GITHUB_OUTPUT

  publish-smoke:
    name: Publish Smoke (${{ matrix.rid }})
    needs: prepare-publish-matrix
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-publish-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.104

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        shell: pwsh
        run: dotnet restore DevProjex.sln

      - name: Publish
        shell: pwsh
        run: >
          dotnet publish Apps/Avalonia/DevProjex.Avalonia/DevProjex.Avalonia.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:PublishTrimmed=false
          /p:DebugType=None
          /p:DebugSymbols=false
          -o artifacts/publish/${{ matrix.rid }}

      - name: Startup Smoke (Windows x64)
        if: ${{ matrix.rid == 'win-x64' }}
        shell: pwsh
        run: |
          $exePath = Resolve-Path "artifacts/publish/${{ matrix.rid }}/DevProjex.exe"
          $workingDirectory = Split-Path -Path $exePath -Parent

          $process = Start-Process -FilePath $exePath -WorkingDirectory $workingDirectory -PassThru
          try {
            Start-Sleep -Seconds 5
            $process.Refresh()

            if ($process.HasExited) {
              throw "Published app exited too early during startup smoke. ExitCode=$($process.ExitCode)"
            }

            Write-Host "Startup smoke passed. Process stayed alive for 5 seconds."
          }
          finally {
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
              $process.WaitForExit(5000) | Out-Null
            }
          }
