name: Release Validation

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-release-config:
    name: Validate Release Config
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Validate release metadata
        shell: pwsh
        run: ./Scripts/validate-release-config.ps1

  publish-smoke:
    name: Publish Smoke (${{ matrix.rid }})
    needs: validate-release-config
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            rid: win-x64
          - runner: windows-latest
            rid: win-arm64
          - runner: ubuntu-latest
            rid: linux-x64
          - runner: ubuntu-latest
            rid: linux-arm64
          - runner: macos-latest
            rid: osx-x64
          - runner: macos-latest
            rid: osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.104

      - name: Restore
        shell: pwsh
        run: dotnet restore DevProjex.sln

      - name: Publish
        shell: pwsh
        run: >
          dotnet publish Apps/Avalonia/DevProjex.Avalonia/DevProjex.Avalonia.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:PublishTrimmed=false
          /p:DebugType=None
          /p:DebugSymbols=false
          -o artifacts/publish/${{ matrix.rid }}

  store-package-smoke:
    name: Store Package Smoke
    needs: validate-release-config
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.104

      - name: Build Store package smoke
        shell: pwsh
        run: ./Scripts/smoke-store-build.ps1
