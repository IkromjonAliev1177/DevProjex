name: .NET CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DEVPROJEX_FAST_UI_TESTS: 1

concurrency:
  group: dotnet-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-matrix:
    name: Prepare CI Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Select CI matrix
        id: set-matrix
        shell: pwsh
        run: |
          $isFullMatrix =
            '${{ github.event_name }}' -eq 'workflow_dispatch' -or
            '${{ github.ref }}' -eq 'refs/heads/master'

          # Feature branches keep a fast confidence matrix: Windows covers the full
          # app surface, Linux keeps non-UI integration confidence, and macOS still
          # compiles/runs the core unit layer. Full cross-platform UI/integration
          # coverage stays on master and on manual runs.
          if ($isFullMatrix) {
            $matrix = @{
              include = @(
                @{ os_name = 'Windows'; runner = 'windows-latest'; os_id = 'windows'; suite_name = 'Unit'; suite_id = 'unit'; project_path = 'Tests/DevProjex.Tests.Unit/DevProjex.Tests.Unit.csproj'; trx_name = 'unit.trx' },
                @{ os_name = 'Windows'; runner = 'windows-latest'; os_id = 'windows'; suite_name = 'Integration'; suite_id = 'integration'; project_path = 'Tests/DevProjex.Tests.Integration/DevProjex.Tests.Integration.csproj'; trx_name = 'integration.trx' },
                @{ os_name = 'Windows'; runner = 'windows-latest'; os_id = 'windows'; suite_name = 'UI'; suite_id = 'ui'; project_path = 'Tests/DevProjex.Tests.UI/DevProjex.Tests.UI.csproj'; trx_name = 'ui.trx' },
                @{ os_name = 'Linux'; runner = 'ubuntu-latest'; os_id = 'linux'; suite_name = 'Unit'; suite_id = 'unit'; project_path = 'Tests/DevProjex.Tests.Unit/DevProjex.Tests.Unit.csproj'; trx_name = 'unit.trx' },
                @{ os_name = 'Linux'; runner = 'ubuntu-latest'; os_id = 'linux'; suite_name = 'Integration'; suite_id = 'integration'; project_path = 'Tests/DevProjex.Tests.Integration/DevProjex.Tests.Integration.csproj'; trx_name = 'integration.trx' },
                @{ os_name = 'Linux'; runner = 'ubuntu-latest'; os_id = 'linux'; suite_name = 'UI'; suite_id = 'ui'; project_path = 'Tests/DevProjex.Tests.UI/DevProjex.Tests.UI.csproj'; trx_name = 'ui.trx' },
                @{ os_name = 'macOS'; runner = 'macos-latest'; os_id = 'macos'; suite_name = 'Unit'; suite_id = 'unit'; project_path = 'Tests/DevProjex.Tests.Unit/DevProjex.Tests.Unit.csproj'; trx_name = 'unit.trx' },
                @{ os_name = 'macOS'; runner = 'macos-latest'; os_id = 'macos'; suite_name = 'Integration'; suite_id = 'integration'; project_path = 'Tests/DevProjex.Tests.Integration/DevProjex.Tests.Integration.csproj'; trx_name = 'integration.trx' },
                @{ os_name = 'macOS'; runner = 'macos-latest'; os_id = 'macos'; suite_name = 'UI'; suite_id = 'ui'; project_path = 'Tests/DevProjex.Tests.UI/DevProjex.Tests.UI.csproj'; trx_name = 'ui.trx' }
              )
            }
          }
          else {
            $matrix = @{
              include = @(
                @{ os_name = 'Windows'; runner = 'windows-latest'; os_id = 'windows'; suite_name = 'Unit'; suite_id = 'unit'; project_path = 'Tests/DevProjex.Tests.Unit/DevProjex.Tests.Unit.csproj'; trx_name = 'unit.trx' },
                @{ os_name = 'Windows'; runner = 'windows-latest'; os_id = 'windows'; suite_name = 'Integration'; suite_id = 'integration'; project_path = 'Tests/DevProjex.Tests.Integration/DevProjex.Tests.Integration.csproj'; trx_name = 'integration.trx' },
                @{ os_name = 'Windows'; runner = 'windows-latest'; os_id = 'windows'; suite_name = 'UI'; suite_id = 'ui'; project_path = 'Tests/DevProjex.Tests.UI/DevProjex.Tests.UI.csproj'; trx_name = 'ui.trx' },
                @{ os_name = 'Linux'; runner = 'ubuntu-latest'; os_id = 'linux'; suite_name = 'Unit'; suite_id = 'unit'; project_path = 'Tests/DevProjex.Tests.Unit/DevProjex.Tests.Unit.csproj'; trx_name = 'unit.trx' },
                @{ os_name = 'Linux'; runner = 'ubuntu-latest'; os_id = 'linux'; suite_name = 'Integration'; suite_id = 'integration'; project_path = 'Tests/DevProjex.Tests.Integration/DevProjex.Tests.Integration.csproj'; trx_name = 'integration.trx' },
                @{ os_name = 'macOS'; runner = 'macos-latest'; os_id = 'macos'; suite_name = 'Unit'; suite_id = 'unit'; project_path = 'Tests/DevProjex.Tests.Unit/DevProjex.Tests.Unit.csproj'; trx_name = 'unit.trx' }
              )
            }
          }

          "matrix=$($matrix | ConvertTo-Json -Compress -Depth 5)" >> $env:GITHUB_OUTPUT

  test-suite:
    name: CI (${{ matrix.os_name }} / ${{ matrix.suite_name }})
    needs: prepare-matrix
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.104

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        shell: pwsh
        run: dotnet restore ${{ matrix.project_path }}

      - name: Build
        shell: pwsh
        run: dotnet build ${{ matrix.project_path }} -c Release --no-restore

      - name: Ensure Linux headless runner
        if: ${{ matrix.os_id == 'linux' }}
        shell: bash
        run: |
          if ! command -v xvfb-run >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y xvfb
          fi

      - name: Run ${{ matrix.suite_name }} Tests
        if: ${{ matrix.os_id != 'linux' }}
        shell: pwsh
        run: >
          dotnet test ${{ matrix.project_path }}
          -c Release
          --no-build
          --verbosity minimal
          --logger "trx;LogFileName=${{ matrix.trx_name }}"
          --results-directory "TestResults/${{ matrix.suite_id }}"

      - name: Run ${{ matrix.suite_name }} Tests (Linux headless)
        if: ${{ matrix.os_id == 'linux' }}
        shell: bash
        run: >
          xvfb-run -a dotnet test ${{ matrix.project_path }}
          -c Release
          --no-build
          --verbosity minimal
          --logger "trx;LogFileName=${{ matrix.trx_name }}"
          --results-directory "TestResults/${{ matrix.suite_id }}"

      - name: Upload Test Results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os_id }}-${{ matrix.suite_id }}
          path: TestResults/**/*.trx
          if-no-files-found: ignore
