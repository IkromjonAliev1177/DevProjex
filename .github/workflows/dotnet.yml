name: .NET CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dotnet-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-release-config:
    name: Validate Release Config
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Validate release metadata
        shell: pwsh
        run: ./Scripts/validate-release-config.ps1

  build-test:
    name: CI (${{ matrix.name }})
    needs: validate-release-config
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            runner: windows-latest
            os_id: windows
            run_integration: true
          - name: Linux
            runner: ubuntu-latest
            os_id: linux
            run_integration: true
          - name: macOS
            runner: macos-latest
            os_id: macos
            run_integration: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.104

      - name: Restore
        shell: pwsh
        run: dotnet restore DevProjex.sln

      - name: Build
        shell: pwsh
        run: dotnet build DevProjex.sln -c Release --no-restore

      - name: Ensure Linux UI test runner
        if: ${{ matrix.os_id == 'linux' }}
        shell: bash
        run: |
          if ! command -v xvfb-run >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y xvfb
          fi

      - name: Test Unit
        if: ${{ matrix.os_id != 'linux' }}
        shell: pwsh
        run: >
          dotnet test Tests/DevProjex.Tests.Unit/DevProjex.Tests.Unit.csproj
          -c Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=unit.trx"
          --results-directory "TestResults/unit"

      - name: Test Unit (Linux headless)
        if: ${{ matrix.os_id == 'linux' }}
        shell: bash
        run: >
          xvfb-run -a dotnet test Tests/DevProjex.Tests.Unit/DevProjex.Tests.Unit.csproj
          -c Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=unit.trx"
          --results-directory "TestResults/unit"

      - name: Test Integration
        if: ${{ matrix.run_integration && matrix.os_id != 'linux' }}
        shell: pwsh
        run: >
          dotnet test Tests/DevProjex.Tests.Integration/DevProjex.Tests.Integration.csproj
          -c Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=integration.trx"
          --results-directory "TestResults/integration"

      - name: Test Integration (Linux headless)
        if: ${{ matrix.run_integration && matrix.os_id == 'linux' }}
        shell: bash
        run: >
          xvfb-run -a dotnet test Tests/DevProjex.Tests.Integration/DevProjex.Tests.Integration.csproj
          -c Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=integration.trx"
          --results-directory "TestResults/integration"

      - name: Upload Test Results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os_id }}
          path: TestResults/**/*.trx
          if-no-files-found: ignore
